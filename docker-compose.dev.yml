version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: auraspear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auraspear_soc
      POSTGRES_USER: auraspear
      POSTGRES_PASSWORD: auraspear_secret
    ports:
      - '5432:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U auraspear -d auraspear_soc']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auraspear-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
