# =============================================================================
# AuraSpear SOC — Logstash Pipeline Configuration
# =============================================================================
# Inputs:
#   - Beats on port 5044 (Filebeat, Winlogbeat, etc.)
#   - Syslog on port 5140 (TCP/UDP)
#   - HTTP on port 8088 (JSON payloads for testing)
#
# Output:
#   - stdout (for local dev visibility)
# =============================================================================

input {
  # Beats input (Filebeat, Winlogbeat, Metricbeat)
  beats {
    port => 5044
  }

  # Syslog input
  syslog {
    port => 5140
    type => "syslog"
  }

  # HTTP input (for testing / manual ingestion)
  http {
    port => 8088
    codec => json
    type => "http_json"
  }
}

filter {
  # Add ingestion timestamp
  mutate {
    add_field => { "[@metadata][ingested_at]" => "%{@timestamp}" }
  }

  # Parse syslog messages
  if [type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}" }
      add_field => [ "received_at", "%{@timestamp}" ]
    }
    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
    }
  }

  # Tag all events with auraspear source
  mutate {
    add_tag => [ "auraspear" ]
  }
}

output {
  # Dev: print to stdout for log visibility
  stdout {
    codec => rubydebug
  }
}
